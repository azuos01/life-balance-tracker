name: life_balance_tracker
description: Life Balance Tracker - Sistema de Gestão de Vida Gamificado
version: 2.4.0+7

# ── Política de versionamento (MAJOR.MINOR.PATCH+BUILD) ──────────────────────
# MAJOR (1→2→...): alterações complexas na arquitetura do código
#                  ex: mudança de providers, refatoração de camadas
# MINOR (0→1→...): implementação de melhorias e novas funcionalidades
#                  ex: nova tela, nova feature, integração externa
# PATCH (0→0→1): correções de bugs
#                  ex: fix de lógica, crash fix, correção visual
# BUILD (+N):    incrementado a cada publicação/release

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  # Firebase Auth
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  google_sign_in: ^6.2.2
  # Cloud Firestore — banco de dados por usuário
  cloud_firestore: ^5.6.0
  # LinkedIn OAuth2 PKCE + HTTP
  url_launcher: ^6.3.1
  http: ^1.2.2
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
