name: 🚀 CI/CD — Test + Deploy Flutter Web → GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Opt-in para Node.js 24 (obrigatório a partir de junho/2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Testes unitários ────────────────────────────────────────────────────
  test:
    name: 🧪 Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Instalar dependências
        run: flutter pub get

      - name: 🔍 Análise estática (sem warnings de info)
        run: flutter analyze --no-fatal-infos

      - name: 🧪 Executar testes unitários
        run: flutter test --reporter=expanded

      - name: 📊 Coletar cobertura
        run: flutter test --coverage --reporter=expanded
        continue-on-error: true

      - name: 📤 Upload relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7
          if-no-files-found: ignore

  # ── 2. Build e Deploy (apenas push em main, após testes passarem) ──────────
  build-and-deploy:
    name: 🏗️ Build + Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Instalar dependências
        run: flutter pub get

      - name: 🔨 Build web (release)
        run: flutter build web --release --base-href "/life-balance-tracker/"

      - name: 🌐 Deploy → GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
